<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" type="text/css" href="details.css" />
  
  <title>Détails produit</title>

</head>
<body>

  <div class="wrapper">
    <div class="container row justify-content-center">
      <!-- Colonne image -->
      <div class="imageProduct col-md-6 text-center">
        <img src="../media/test/I1.png" alt="Produit principal" class="MainImage img-fluid" id="mainImage" />
        <hr />
        <div class="imgGroupe d-flex justify-content-center flex-wrap">
            <img src="../media/test/I1.jpg" alt="Image 1" class="img-thumbnail thumbnail" />
            <img src="../media/test/I2.jpg" alt="Image 2" class="img-thumbnail thumbnail" />
            <img src="../media/test/I3.jpg" alt="Image 3" class="img-thumbnail thumbnail" />
             <img src="../media/test/I4.jpg" alt="Image 4" class="img-thumbnail thumbnail" />
            <img src="../media/test/I5.jpg" alt="Image 5" class="img-thumbnail thumbnail" />
        </div>
      </div>

      <!-- Colonne détails -->
      <div class="details col-md-6 text-center">
        <h1>PRODUCT NAME</h1>
        <p class="price">2500 DA</p>
        <p class="discription">
          Jollie sweet pour homme qui va vous aider dans la vie. Pour bien vivre, vivre c’est bien. Moi j’adore beaucoup.
        </p>

        <p>Taill :</p>
        <div class="taillGroupe mb-3">
          <button>S</button>
          <button>M</button>
          <button>L</button>
          <button>XL</button>
          <button>XXL</button>
        </div>

        <!-- Sélecteur de quantité -->
        <div class="quantity-selector d-flex justify-content-center align-items-center mb-3">
          <button class="btn btn-outline-light " id="decrease">-</button>
          <input type="text" id="quantity" class="form-control mx-2 text-center" value="1" readonly style="width: 60px;" />
          <button class="btn btn-outline-light" id="increase">+</button>
        </div>

        <!-- Boutons d'action -->
        <div class="mt-4 buton">
          <button class="btn btn-light btn-dark px-4 py-2">
            <i class='bx bx-cart'></i> Ajouter au panier
          </button>
          <button class="btn btnadd px-4 py-2 btn-danger">
            Bay now
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Vagues en arrière-plan -->
  <div class="background-waves" aria-hidden="true">
    <svg class="wave wave1" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,96L48,117.3C96,139,192,181,288,186.7C384,192,480,160,576,138.7C672,117,768,107,864,117.3C960,128,1056,160,1152,165.3C1248,171,1344,149,1392,138.7L1440,128L1440,320L0,320Z"></path>
    </svg>
    
    <svg class="wave wave2" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,192L48,197.3C96,203,192,213,288,197.3C384,181,480,139,576,128C672,117,768,139,864,138.7C960,139,1056,117,1152,128C1248,139,1344,181,1392,202.7L1440,224L1440,320L0,320Z"></path>
    </svg>

    <svg class="wave wave3" viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,256L48,229.3C96,203,192,149,288,117.3C384,85,480,75,576,96C672,117,768,171,864,181.3C960,192,1056,160,1152,144C1248,128,1344,128,1392,128L1440,128L1440,320L0,320Z"></path>
    </svg>
  </div>

  <script type="text/javascript" src="details.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
