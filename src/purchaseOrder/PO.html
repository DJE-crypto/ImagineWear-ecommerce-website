<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmation</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

  <div class="bon-container">
    <h2>Order Confirmation</h2>

    <div class="line"><span class="label">Order Date:</span> <span id="orderDate"></span></div>
    <div class="line"><span class="label">Expected Delivery Date:</span> <span id="deliveryDate"></span></div>
    <div class="line"><span class="label">Total Price:</span> <span id="totalPrice"></span></div>
    <div class="line"><span class="label">Payment Method:</span> <span id="paymentMethod"></span></div>
    <div class="line"><span class="label">Payment Status:</span> <span id="paymentStatus"></span></div>

    <div class="footer">
      Thank you for your order!<br>
      You will receive a confirmation via message or email.<br>
      Visit us at <a href="#"><strong style="color: coral;">Embroidery Wear</strong></a>
    </div>
  </div>

<script type="text/javascript" src="script.js"></script>  

</body>
</html>
